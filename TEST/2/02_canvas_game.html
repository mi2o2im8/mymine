<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>canvas game</title>

    <script>
        //전역변수로서 이미지객체 준비
        var imgPlayer= new Image();
        imgPlayer.src= './image/arm1.png';

        //플레이어가 표시될 이미지의 중심 좌표 변수
        // var x=200;
        // var y=250; 아래처럼 여러개 가능
        var x=200, y=250;
        //플레이어의 사이즈를 동적으로 변경할 수도 있음.
        //이미지의 절반 너비와 높이 값 저장
        var w=40;
        var h=40;

        // 플레이어의 이동 방향과 속도 변수
        var dx= 1;
        var dy= 1;

        // 배경 이미지 준비
        var imgBg= new Image();
        imgBg.src='./image/bg.png';

        //배경 이미지의 좌상단 좌표 (얘는 가운데 좌표가 필요 x)
        var bx=0, by=0;;

        //그림도구와 캔버스를 전역변수로 준비
        var canvas;
        var context;

        //이미지를 그려내는 작업은...body영역의 로딩이 완료된 후 진행
        function loaded(){
            canvas= document.getElementById('c1');
            context= canvas.getContext('2d');

            //게임을 진행하는 기능함수 호출
            runGame();
            // 10ms마다 runGame()함수를 다시 호출
            setInterval(runGame,10); //10밀리 마다 그림을 그려라. 1초에 100프레임
        }//ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ

        function runGame(){
            moveAll(); //1.움직이기..
            drawAll(); //2.이미지 그리기
        }

        function moveAll(){
            //배경 이미지 이동(왼쪽으로..)
            bx+= -1;
            if(bx <= -400) bx=0; //배경이 400만큼 나가면 다시 돌아옴 (무한횡스크롤게임)

            //플레이어의 위치를 이동
            x+= dx;
            y+= dy;

            //벽에 닿으면..반대방향으로..
            // if(x<0 || x>400){
            //     dx= -dx;
            // } 실행문이 이렇게 한줄이면. 중괄호 없어도 됨
            if(x<0 || x>400-w) dx= -dx;
            if(y<0 || y>500-h) dy= -dy;
        }//ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ

        function drawAll(){
            //배경 이미지 그리기
            context.drawImage(imgBg, bx, by, 400, 500); //canvas 사이즈
            context.drawImage(imgBg, bx+400, by, 400, 500); //canvas 사이즈

            //플레이어 이미지 그려내기
            context.drawImage(imgPlayer, x-w, y-h, w*2, h*2);

        }//ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ

        function down(){
            keyCode= window.event.keyCode;
            switch(keyCode){
                case 37: dx= -2; break; //LEFT
                case 38: dy= -2; break; //UP
                case 39: dx= 2; break; //RIGHT
                case 40: dy= 2; break; //DOWN

                default: dx=1; dy=1; //AUTO 손가락을 떼면 디폴트값으로 알아서 움직인다.
            }

        }//ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ

        function up(){
            keyCode= window.event.keyCode;
            //방향키를 높으면.. 멈추도록..
            if(keyCode>=37 && keyCode<=40){
                dx=0; dy=0;
            }


        }//ㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡㅡ



    </script>

</head>
<body onload="loaded()" onkeydown="down()" onkeyup="up()">
    <canvas id="c1" width="400" height="500" style="border: 2px solid brown;" ></canvas>
    
</body>
</html>
